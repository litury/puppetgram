server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # За Traefik (TLS-терминация снаружи) nginx не знает про HTTPS и строит
    # редиректы со слешем абсолютными с http:// → в PWA secure-context это
    # mixed-content → падает service worker. Делаем редиректы относительными.
    absolute_redirect off;
    server_name_in_redirect off;
    port_in_redirect off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # SPA fallback - все запросы на index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
